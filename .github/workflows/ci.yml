on:
  push:
    paths:
      - .github/workflows/ci.yml
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check network connection
        id: network
        run: |
          wget "$(curl -s 'https://api.github.com/repos/AlphaKR93/.github/releases/tags/ci' | jq -r '.assets[] | select(.name == "content") | .browser_download_url')"  -qO -
